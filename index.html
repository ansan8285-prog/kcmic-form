<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국건설자재시험연구원 | 시험 서류 작성</title>
<style>
  :root{
    --navy-900:#102A45; --navy-700:#1F4E79; --navy-600:#2C6296; --navy-50:#EAF1F8;
    --paper:#F3F5F7; --border:#DEE4EA; --ink:#1E2530; --ink-muted:#6B7785;
    --seal:#B23A33; --good:#2C6296;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,'Malgun Gothic',sans-serif;line-height:1.6;}
  .hero{background:linear-gradient(135deg,var(--navy-900) 0%, var(--navy-700) 100%);color:#fff;padding:32px 20px;}
  .hero-inner{max-width:740px;margin:0 auto;}
  .hero h1{font-size:21px;font-weight:800;margin:0 0 4px;}
  .hero p{margin:0;font-size:13.5px;color:#CFE0F2;}
  main{max-width:740px;margin:0 auto;padding:28px 18px 100px;}
  section.block{margin-bottom:24px;}
  .common-card{background:#fff;border:1.5px solid var(--navy-600);border-radius:14px;padding:20px;}
  .tag-common{display:inline-block;font-size:11px;font-weight:800;color:#fff;background:var(--navy-700);padding:3px 8px;border-radius:5px;margin-bottom:8px;}
  .doc-title{font-size:16px;font-weight:800;color:var(--navy-900);margin:0 0 4px;}
  .doc-note{font-size:12.5px;color:var(--ink-muted);margin:0 0 16px;}
  .doc-section{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}

  /* ===== index nav ===== */
  .idx-nav{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 2px 10px rgba(16,42,69,0.06);}
  .idx-inner{max-width:740px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);}
  .idx-btn{position:relative;background:#EEF2F6;border:none;border-right:1px solid var(--border);padding:12px 6px 10px;font-size:12.5px;font-weight:700;color:var(--ink-muted);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;line-height:1.3;}
  .idx-btn:last-child{border-right:none;}
  .idx-btn .idx-num{font-size:10.5px;font-weight:800;color:var(--navy-600);background:#fff;border:1px solid var(--border);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .idx-btn.active{background:var(--navy-900);color:#fff;}
  .idx-btn.active .idx-num{background:var(--navy-900);border-color:#fff;color:#fff;}
  .idx-check{position:absolute;top:5px;right:6px;width:15px;height:15px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:800;}
  .idx-check.done{background:var(--good);color:#fff;}
  .idx-check.partial{background:#fff;border:1.5px solid var(--seal);}
  @media(max-width:520px){.idx-inner{grid-template-columns:repeat(2,1fr);} .idx-btn{padding:10px 4px 8px;font-size:11.5px;}}

  .page{display:none;}
  .page.active-page{display:block;}
  .page-nav-foot{display:flex;justify-content:space-between;gap:10px;margin-top:16px;}
  .page-nav-foot button{flex:1;padding:11px 0;border-radius:9px;font-size:13.5px;font-weight:700;border:1px solid var(--border);background:#fff;color:var(--navy-700);cursor:pointer;}
  .page-nav-foot button:disabled{opacity:0.35;cursor:default;}
  .field{margin-bottom:14px;}
  .field > label.flabel{display:block;font-size:12.5px;font-weight:700;color:var(--ink-muted);margin-bottom:5px;}
  
  .address-group { display: flex; gap: 8px; margin-bottom: 6px; }
  .address-group button { background: var(--navy-700); color: #fff; border: none; padding: 0 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; white-space: nowrap; }

  .field input[type=text],.field input[type=tel],.field input[type=email],.field input[type=date],.field textarea,.field select{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--ink);
  }
  .field input[readonly]{background:#FAFBFC;color:var(--navy-700);font-weight:600;}
  .field textarea{resize:vertical;min-height:54px;}
  .req::after{content:" *";color:var(--seal);}
  .choice-row{display:flex;flex-wrap:wrap;gap:14px;font-size:13.5px;}
  .choice-row label{display:flex;align-items:center;gap:5px;font-weight:500;cursor:pointer;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:520px){.two-col{grid-template-columns:1fr;}}
  .sub{display:none;margin-top:8px;padding:10px 12px;background:#FAFBFC;border:1px solid var(--border);border-radius:8px;}
  .sub.show{display:block;}
  .mat-box{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:6px;background:#FAFBFC;}
  .mat-box .sub-note{font-size:12px;color:var(--ink-muted);margin:6px 0;}
  
  /* ===== 구성목록 테이블 디자인 수정 ===== */
  .dyn-table{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:6px;}
  .dyn-table input{text-align:center;}
  .dyn-head{display:flex;background:var(--navy-50);font-size:12px;font-weight:800;color:var(--navy-900);}
  .dyn-head div,.dyn-row div{padding:8px 6px;flex:1;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
  .dyn-head div:last-child,.dyn-row div:last-child{border-right:none;}
  .dyn-row{display:flex;border-top:1px solid var(--border);background:#fff;}
  .dyn-row input{width:100%;border:none;padding:4px 2px;font-size:13px;background:transparent;font-family:inherit;text-align:center;}
  .dyn-row input:focus{outline:none;background:#f0f4f8;}
  .del-btn{background:var(--seal);color:#fff;border:none;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;}
  
  .add-row-btn{margin-top:8px;font-size:12.5px;font-weight:700;color:var(--navy-700);background:var(--navy-50);border:1px solid var(--border);border-radius:7px;padding:6px 12px;cursor:pointer;}
  
  /* ===== 도면 및 이미지 업로드 영역 ===== */
  .diagram-container { margin-top: 14px; padding: 16px; background: #fff; border: 1px solid var(--border); border-radius: 10px; text-align: center; }
  .diagram-canvas-wrap { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 12px; }
  .canvas-box { background: #fff; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
  .canvas-box p { margin: 0 0 6px 0; font-size: 12px; font-weight: bold; color: var(--navy-700); }
  .custom-upload-box { margin-top: 10px; padding: 10px; border: 1px dashed var(--navy-600); border-radius: 8px; background: #fafbfc; }
  .custom-upload-box label { font-size: 12.5px; font-weight: bold; color: var(--navy-700); cursor: pointer; }
  .preview-user-img { max-width: 100%; max-height: 180px; margin-top: 8px; display: none; border: 1px solid var(--border); }

  .crit-card{border:1px solid var(--border);border-radius:10px;padding:12px 14px;background:#FAFBFC;font-size:12.5px;margin-top:6px;}
  .crit-card table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .crit-card td{padding:4px 6px;border-bottom:1px solid var(--border);}
  .sig-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:24px;}
  .sig-wrap h2{font-size:16px;font-weight:800;margin:0 0 4px;}
  .sig-wrap p{font-size:12.5px;color:var(--ink-muted);margin:0 0 12px;}
  #sigPad{width:100%;height:160px;border:1.5px dashed var(--border);border-radius:10px;background:#FAFBFC;touch-action:none;}
  .sig-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .sig-clear{font-size:12.5px;color:var(--seal);background:none;border:none;font-weight:700;cursor:pointer;}
  .sig-status{font-size:12px;color:var(--ink-muted);}
  .sig-status.ok{color:var(--good);font-weight:700;}
  .submit-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);padding:14px 18px;display:flex;gap:10px;box-shadow:0 -4px 16px rgba(0,0,0,0.04);z-index:99;}
  .btn{flex:1;padding:13px 0;border-radius:10px;font-size:14.5px;font-weight:800;border:none;cursor:pointer;text-align:center;}
  .btn-primary{background:var(--navy-900);color:#fff;}
  .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--ink-muted);}
  .warn{font-size:12.5px;color:var(--seal);margin-top:6px;display:none;}
  .warn.show{display:block;}

  /* ===== form-replica ===== */
  #previewWrap{display:none;max-width:780px;margin:0 auto;padding:28px 18px 60px;}
  .pv-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:24px;}
  .pv-card .dl-bar{display:flex;justify-content:flex-end;margin-bottom:10px;}
  .pv-scroll{overflow-x:auto;background:#E9ECEF;padding:16px;border-radius:10px;}
  .a4-page{width:210mm;min-height:297mm;margin:0 auto;background:#fff;padding:10mm 12mm;box-sizing:border-box;box-shadow:0 0 0 1px #ccc;}
  table.formgrid{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;}
  .formgrid td{border:1px solid #444;padding:4px 6px;vertical-align:middle;word-break:break-word;line-height:1.45;}
  .formgrid .ttl{border:none;text-align:center;font-size:19px;font-weight:800;letter-spacing:8px;padding:4px 0 12px;}
  .formgrid .lab{background:#EFF2F5;font-weight:700;text-align:center;font-size:11.5px;white-space:nowrap;}
  .formgrid .sect{background:var(--navy-900);color:#fff;font-weight:800;text-align:center;font-size:12px;}
  .formgrid .small{font-size:11px;color:#555;}
  .sigline{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
  .sigline img{height:42px;}
  .formgrid .center{text-align:center;}
  .formgrid .declare{border:none;padding:14px 4px;font-size:12.5px;line-height:1.8;}
  .pv-diagram-img { max-height: 140px; display: block; margin: 8px auto; }

  @media print{ .no-print{display:none !important;} }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="hero no-print">
  <div class="hero-inner">
    <h1>한국건설자재시험연구원</h1>
    <p>시험 서류 작성 — 공통정보는 한 번만 입력하면 모든 서류에 자동으로 들어갑니다</p>
  </div>
</div>

<nav class="idx-nav no-print" id="idxNav">
  <div class="idx-inner">
    <button type="button" class="idx-btn" data-page="0"><span class="idx-num">1</span>기본정보<span class="idx-check" id="chk0"></span></button>
    <button type="button" class="idx-btn" data-page="1"><span class="idx-num">2</span>시험의뢰서<span class="idx-check" id="chk1"></span></button>
    <button type="button" class="idx-btn" data-page="2"><span class="idx-num">3</span>시험체 구성 확인서<span class="idx-check" id="chk2"></span></button>
    <button type="button" class="idx-btn" data-page="3"><span class="idx-num">4</span>적합성 진술 신청서<span class="idx-check" id="chk3"></span></button>
  </div>
</nav>

<main id="editorMain" class="no-print">

  <section class="block page active-page" id="pageHome">
    <div class="common-card">
      <span class="tag-common">공통사항 — 한 번만 입력</span>
      <p class="doc-title">의뢰 기본정보</p>
      <div class="two-col">
        <div class="field"><label class="flabel req">회사명</label><input type="text" id="c_company" placeholder="(주)대한건설자재"></div>
        <div class="field"><label class="flabel req">의뢰자</label><input type="text" id="c_requester" placeholder="홍길동"></div>
      </div>
      <div class="two-col">
        <div class="field"><label class="flabel req">전화번호</label><input type="tel" id="c_phone" placeholder="010-0000-0000"></div>
        <div class="field"><label class="flabel req">이메일</label><input type="email" id="c_email" placeholder="kcmic@naver.com"></div>
      </div>
      <div class="two-col">
        <div class="field"><label class="flabel">공사명</label><input type="text" id="c_project" placeholder="○○아파트 신축공사"></div>
        <div class="field"><label class="flabel req">시료명</label><input type="text" id="c_sample" placeholder="CRC 보드"></div>
      </div>

      <div class="field">
        <label class="flabel req">재료 구분 (택1)</label>
        <div class="mat-box">
          <div class="choice-row">
            <label><input type="radio" name="MAT" value="불연재료"> 불연재료</label>
            <label><input type="radio" name="MAT" value="준불연재료"> 준불연재료</label>
            <label><input type="radio" name="MAT" value="난연재료"> 난연재료</label>
          </div>
          <p class="sub-note">선택하면 아래 시험이 자동 체크됩니다. 체크 해제·추가 자유롭게 가능합니다.</p>
          <div class="choice-row">
            <label><input type="checkbox" id="sub_bulyeon" value="불연시험"> 불연시험</label>
            <label><input type="checkbox" id="sub_yeolbang" value="열방출률시험"> 열방출률시험</label>
            <label><input type="checkbox" id="sub_gas" value="가스유해성시험"> 가스유해성시험</label>
          </div>
        </div>
      </div>
    </div>
    <div class="page-nav-foot">
      <button type="button" disabled>이전</button>
      <button type="button" onclick="showPage(1)">다음: 시험의뢰서 →</button>
    </div>
  </section>

  <section class="doc-section page" id="docA">
    <p class="doc-title">① 시험의뢰서</p>
    <div class="field">
      <label class="flabel req">주소</label>
      <div class="address-group">
        <input type="text" id="a_address" data-label="주소" placeholder="주소 검색을 누르거나 직접 입력해 주세요">
        <button type="button" onclick="searchAddress()">주소 검색</button>
      </div>
      <input type="text" id="a_address_detail" placeholder="상세주소를 입력해 주세요">
    </div>
    <div class="field"><label class="flabel">팩스번호</label><input type="tel" data-label="팩스번호" placeholder="031-000-0000"></div>
    <div class="field">
      <label class="flabel">구분</label>
      <div class="choice-row">
        <label><input type="radio" name="A_gubun" value="기업체" checked> 기업체</label>
        <label><input type="radio" name="A_gubun" value="개인"> 개인</label>
        <label><input type="radio" name="A_gubun" value="대학"> 대학</label>
        <label><input type="radio" name="A_gubun" value="연구소"> 연구소</label>
        <label><input type="radio" name="A_gubun" value="공공기관"> 공공기관</label>
        <label><input type="radio" name="A_gubun" value="기타"> 기타</label>
      </div>
    </div>
    <div class="two-col">
      <div class="field">
        <label class="flabel">성적서 발급</label>
        <div class="choice-row">
          <label><input type="radio" name="A_balgeup" value="발급" checked> 발급</label>
          <label><input type="radio" name="A_balgeup" value="미발급"> 미발급</label>
        </div>
      </div>
      <div class="field">
        <label class="flabel">성적서 종류</label>
        <div class="choice-row">
          <label><input type="radio" name="A_jongryu" value="KOLAS공인성적서" checked> KOLAS공인</label>
          <label><input type="radio" name="A_jongryu" value="일반성적서"> 일반성적서</label>
        </div>
      </div>
    </div>
    <div class="two-col">
      <div class="field">
        <label class="flabel">언어 (복수 선택 가능)</label>
        <div class="choice-row">
          <label><input type="checkbox" id="A_lang_kr" checked> 국문</label>
          <label><input type="checkbox" id="A_lang_en"> 영문</label>
        </div>
      </div>
      <div class="field">
        <label class="flabel">수령방법</label>
        <div class="choice-row">
          <label><input type="radio" name="A_recv" value="직접수령" checked> 직접수령</label>
          <label><input type="radio" name="A_recv" value="우편수령"> 우편수령</label>
        </div>
      </div>
    </div>
    <div class="field"><label class="flabel">용도</label><input type="text" data-label="용도" placeholder="품질관리"></div>

    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
    <div class="field">
      <label class="flabel">시료수량 <span style="font-weight:500;color:var(--ink-muted);">(공통사항 시험 선택에서 자동 계산)</span></label>
      <select id="A_sampleQtySelect" onchange="onQtySelectChange()"></select>
      <div class="sub" id="A_sampleQtyManualWrap"><input type="text" id="A_sampleQtyManual" placeholder="직접 입력"></div>
    </div>
    <div class="two-col">
      <div class="field"><label class="flabel">시료채취장소</label><input type="text" data-label="시료채취장소" placeholder="현장 내"></div>
      <div class="field"><label class="flabel">시료채취일</label><input type="date" data-label="시료채취일"></div>
    </div>
    <div class="two-col">
      <div class="field"><label class="flabel">시료채취자</label><input type="text" data-label="시료채취자" placeholder="홍길동"></div>
      <div class="field"><label class="flabel">참관자</label><input type="text" data-label="참관자" placeholder="김철수"></div>
    </div>
    <div class="two-col">
      <div class="field"><label class="flabel">발주자</label><input type="text" data-label="발주자" placeholder="(주)대한건설"></div>
      <div class="field"><label class="flabel">시공자</label><input type="text" data-label="시공자" placeholder="(주)대한건설자재"></div>
    </div>
    <div class="field">
      <label class="flabel">시료상태</label>
      <div class="choice-row">
        <label><input type="radio" name="A_sangtae" value="이상무" checked> 이상무</label>
        <label><input type="radio" name="A_sangtae" value="이상유"> 이상유</label>
      </div>
      <div class="sub" id="A_sangtaeSub"><input type="text" data-label="이상내용" placeholder="이상내용 기재"></div>
    </div>
    <div class="field">
      <label class="flabel">시료처리</label>
      <div class="choice-row">
        <label><input type="radio" name="A_cheori" value="폐기" checked> 폐기</label>
        <label><input type="radio" name="A_cheori" value="반환"> 반환</label>
      </div>
      <div class="sub" id="A_cheoriSub"><input type="date" data-label="반환일자"></div>
    </div>
    <div class="field"><label class="flabel">고객/변경 요구 협의사항</label><textarea data-label="고객/변경 요구 협의사항" placeholder="특이사항이 있으면 적어주세요"></textarea></div>
    <div class="page-nav-foot">
      <button type="button" onclick="showPage(0)">← 이전: 기본정보</button>
      <button type="button" onclick="showPage(2)">다음: 시험체 구성 확인서 →</button>
    </div>
  </section>

  <section class="doc-section page" id="docB">
    <p class="doc-title">② 시험체 구성 확인서</p>
    <div class="field"><label class="flabel">현장명</label><input type="text" data-label="현장명" placeholder="공사명과 다르면 입력 (같으면 비워두세요)"></div>
    <div class="two-col">
      <div class="field"><label class="flabel req">대표자 성명</label><input type="text" data-label="대표자 성명" placeholder="대표자 성명을 입력해주세요"></div>
      <div class="field"><label class="flabel req">사업자등록번호</label><input type="text" data-label="사업자등록번호" placeholder="000-00-00000"></div>
    </div>
    <div class="field"><label class="flabel">시험종류 (자동 반영)</label><input type="text" id="B_jongryuDisplay" readonly></div>
    <div class="field">
      <label class="flabel">사용부위</label>
      <div class="choice-row">
        <label><input type="radio" name="B_buwi" value="내부 마감재용" checked> 내부 마감재용</label>
        <label><input type="radio" name="B_buwi" value="외벽 마감재용"> 외벽 마감재용</label>

    </div>
    
    <div class="field">
      <label class="flabel req">구성목록 (가열면 필수 선택)</label>
      <div class="dyn-table" id="B_compTable">
        <div class="dyn-head">
          <div style="flex:0.6;">가열면</div>
          <div>구성</div>
          <div>재질</div>
          <div>제조업체</div>
          <div>모델명</div>
          <div>두께/밀도</div>
          <div style="flex:0.5;">삭제</div>
        </div>
        <div class="dyn-row">
          <div style="flex:0.6;"><input type="radio" name="heat_side" checked onchange="syncHeatSide()"></div>
          <div><input data-col="gusung" placeholder="예: 심재" value="심재" oninput="syncHeatSide()"></div>
          <div><input data-col="jaejil" placeholder="예: 우레탄폼"></div>
          <div><input data-col="jejo" placeholder="제조업체"></div>
          <div><input data-col="model" placeholder="모델명" oninput="syncHeatSide()"></div>
          <div><input data-col="thick" placeholder="예: 43mm" oninput="syncHeatSide()"></div>
          <div style="flex:0.5;"><button type="button" class="del-btn" onclick="removeDynRow(this)">삭제</button></div>
        </div>
      </div>
      <button type="button" class="add-row-btn" onclick="addCustomRow()">+ 구성 행 추가</button>
    </div>

    <div class="field">
      <label class="flabel">구조 및 가열면 설명</label>
      <textarea id="B_structure_desc" data-label="구조 및 가열면" placeholder="※ 가열면 확인 必"></textarea>
    </div>

    <div class="diagram-container">
      <p style="margin:0 0 10px; font-size:13px; font-weight:bold; color:var(--navy-900);">구조 도면 자동 계산 및 미리보기</p>
      <div class="diagram-canvas-wrap" id="canvasContainer"></div>
      <div class="custom-upload-box">
        <label for="userImageInput">📎 자동 생성 도면 대신 다른 사진 올리기 (선택)</label>
        <input type="file" id="userImageInput" accept="image/*" style="display:none;" onchange="handleUserImage(this)">
        <br><img id="userImgPreview" class="preview-user-img" alt="사용자 업로드 이미지">
      </div>
    </div>

    <div class="page-nav-foot">
      <button type="button" onclick="showPage(1)">← 이전: 시험의뢰서</button>
      <button type="button" onclick="showPage(3)">다음: 적합성 진술 신청서 →</button>
    </div>
  </section>

  <section class="doc-section page" id="docC">
    <p class="doc-title">③ 적합성 진술 신청서</p>
    <div class="field"><label class="flabel">판정기준 (자동 안내)</label>
      <div class="crit-card" id="C_critPreview"></div>
    </div>
    <div class="field">
      <label class="flabel">의사결정규칙</label>
      <div class="choice-row" style="flex-direction:column;align-items:flex-start;gap:8px;">
        <label><input type="radio" name="C_rule" value="단순채택에 의한 이분/이분법적 진술" checked> 단순채택에 의한 이분/이분법적 진술</label>
        <label><input type="radio" name="C_rule" value="보호대역에 따른 이분/이분법적 진술"> 보호대역에 따른 이분/이분법적 진술</label>
        <label><input type="radio" name="C_rule" value="보호대역에 따른 비이분/비이분법적 진술"> 보호대역에 따른 비이분/비이분법적 진술</label>
      </div>
    </div>
    <div class="field"><label class="flabel">기타 협의사항</label><textarea data-label="기타 협의사항" placeholder="추가수수료, 측정불확도, 결과통보 방식 등"></textarea></div>
    
    <div class="sig-wrap block" id="sigSection">
      <h2>서명</h2>
      <p>아래 칸에 직접 서명해주세요. 제출하시는 모든 서류에 동일하게 적용됩니다.</p>
      <canvas id="sigPad"></canvas>
      <div class="sig-actions">
        <button type="button" class="sig-clear" onclick="clearSig()">서명 지우기</button>
        <span class="sig-status" id="sigStatus">서명이 필요합니다</span>
      </div>
    </div>

    <div class="page-nav-foot">
      <button type="button" onclick="showPage(2)">← 이전: 시험체 구성 확인서</button>
      <button type="button" disabled>마지막 항목입니다</button>
    </div>
  </section>

  <p class="warn no-print" id="warnMsg">⚠ 필수 항목(*)과 서명을 모두 채워주세요.</p>

<div class="submit-bar no-print" id="submitBar">
  <button type="button" class="btn btn-primary" onclick="completeForm()">작성완료</button>
</div>

<div id="previewWrap">
  <div id="previewBody"></div>
  <div class="submit-bar no-print" style="position:static;border-radius:14px;">
    <button class="btn btn-ghost" onclick="backToEdit()">다시 수정하기</button>
  </div>
</div>

<script>
  let manualThicknesses = { gas: "43mm", single: "", multi: "" };

  // ---- 로컬/웹 환경 철저 대응 동적 카카오 주소 API 실행 함수 ----
  function searchAddress() {
    if(location.protocol === 'file:'){
      alert("이 파일을 더블클릭으로 직접 여신 것 같아요(주소창이 file:///로 시작).\n이 상태에서는 주소 검색 결과가 입력칸에 전달되지 않습니다.\n\n해결 방법:\n1) 폴더에서 'python -m http.server' 실행 후 http://localhost:8000 으로 접속\n2) 또는 VSCode 'Live Server' 확장으로 열기\n3) 또는 회사 웹서버/호스팅에 올려서 http(s):// 주소로 접속\n\n그래도 검색을 시도하시겠습니까?");
    }
    // 윈도우에 daum 객체가 비어있을 경우 동적으로 라이브러리를 안전 프로토콜로 주입
    if (typeof daum === 'undefined' || !daum.Postcode) {
      const script = document.createElement('script');
      script.src = 'https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
      script.onload = function() {
        executeKakaoPostcode();
      };
      script.onerror = function() {
        alert("네트워크 연결 상태나 보안 설정으로 인해 주소 검색 라이브러리를 불러올 수 없습니다.");
      };
      document.head.appendChild(script);
    } else {
      executeKakaoPostcode();
    }
  }

  function executeKakaoPostcode() {
    new daum.Postcode({
      oncomplete: function(data) {
        let addr = data.roadAddress || data.jibunAddress;
        if(data.buildingName){ addr += ` (${data.buildingName})`; }
        document.getElementById('a_address').value = addr;
        document.getElementById('a_address_detail').focus();
        updateTabStatus();
      }
    }).open();
  }

  // ---- 탭 네비게이션 제어 ----
  const PAGE_IDS = ['pageHome','docA','docB','docC'];
  let currentPage = 0;
  function showPage(idx){
    PAGE_IDS.forEach((id,i)=>document.getElementById(id).classList.toggle('active-page', i===idx));
    document.querySelectorAll('.idx-btn').forEach((b,i)=>b.classList.toggle('active', i===idx));
    currentPage = idx;
    document.getElementById('idxNav').scrollIntoView({block:'start',behavior:'smooth'});
    if(idx === 2) { drawDiagrams(); }
  }
  document.querySelectorAll('.idx-btn').forEach(b=>{
    b.addEventListener('click', ()=>showPage(parseInt(b.dataset.page,10)));
  });

  // ---- 필수 입력 검증 및 상태 배지 업뎃 ----
  function isHomeComplete(){
    const ids=['c_company','c_requester','c_phone','c_email','c_sample'];
    if(ids.some(id=>!document.getElementById(id).value.trim())) return false;
    if(!matVal()) return false;
    return true;
  }
  function isDocAComplete(){
    return !!document.getElementById('a_address').value.trim();
  }
  function isDocBComplete(){
    const bz = document.querySelector('[data-label="사업자등록번호"]').value.trim();
    const ceo = document.querySelector('[data-label="대표자 성명"]').value.trim();
    const hasHeat = !!document.querySelector('input[name="heat_side"]:checked');
    return !!bz && !!ceo && hasHeat;
  }
  function isDocCComplete(){
    return hasSig;
  }
  function setBadge(idx, state){
    const el = document.getElementById('chk'+idx);
    el.classList.remove('done','partial');
    if(state===true){ el.classList.add('done'); el.textContent='✓'; }
    else { el.classList.add('partial'); el.textContent='!'; }
  }
  function updateTabStatus(){
    setBadge(0, isHomeComplete());
    setBadge(1, isDocAComplete());
    setBadge(2, isDocBComplete());
    setBadge(3, isDocCComplete());
  }
  document.addEventListener('input', updateTabStatus);
  document.addEventListener('change', updateTabStatus);

  // ---- 구성목록 행 추가/삭제 및 연동 기능 ----
  function addCustomRow() {
    const table = document.getElementById('B_compTable');
    const row = document.createElement('div'); row.className='dyn-row';
    row.innerHTML = `
      <div style="flex:0.6;"><input type="radio" name="heat_side" onchange="syncHeatSide()"></div>
      <div><input data-col="gusung" placeholder="구성" oninput="syncHeatSide()"></div>
      <div><input data-col="jaejil" placeholder="재질"></div>
      <div><input data-col="jejo" placeholder="제조업체"></div>
      <div><input data-col="model" placeholder="모델명" oninput="syncHeatSide()"></div>
      <div><input data-col="thick" placeholder="두께" oninput="syncHeatSide()"></div>
      <div style="flex:0.5;"><button type="button" class="del-btn" onclick="removeDynRow(this)">삭제</button></div>
    `;
    table.appendChild(row);
    syncHeatSide();
  }
  function removeDynRow(btn) {
    const table = document.getElementById('B_compTable');
    if(table.querySelectorAll('.dyn-row').length > 1) {
      btn.closest('.dyn-row').remove();
      syncHeatSide();
    } else {
      alert("최소 하나의 구성 항목은 존재해야 합니다.");
    }
  }

  function syncHeatSide() {
    const checkedRadio = document.querySelector('input[name="heat_side"]:checked');
    if(checkedRadio) {
      const row = checkedRadio.closest('.dyn-row');
      const gusung = row.querySelector('[data-col="gusung"]').value.trim() || '지정면';
      const model = row.querySelector('[data-col="model"]').value.trim();
      const descText = `가열면: ${gusung}${model ? ` (${model})` : ''}`;
      document.getElementById('B_structure_desc').value = descText;
    }
    drawDiagrams();
    updateTabStatus();
  }

  let customUserImgData = null;
  function handleUserImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        customUserImgData = e.target.result;
        const preview = document.getElementById('userImgPreview');
        preview.src = customUserImgData;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  // ---- 핵심: 도면 캔버스 그리기 엔진 ----
  function drawDiagrams() {
    const container = document.getElementById('canvasContainer');
    container.innerHTML = ''; 
    const mat = matVal();
    const rows = document.getElementById('B_compTable').querySelectorAll('.dyn-row');
    const rowCount = rows.length;
    
    let heatIndex = 0;
    rows.forEach((r, idx) => {
      if(r.querySelector('input[name="heat_side"]').checked) heatIndex = idx;
    });

    if(mat === '불연재료') {
      createCanvasBox(container, "가스유해성시험용 도면 (규격: 220mm)", "gas", (ctx, currentThick) => {
        ctx.fillStyle = "#eef2f6"; ctx.fillRect(60, 60, 160, 35);
        ctx.strokeStyle = "#102a45"; ctx.lineWidth = 2; ctx.strokeRect(60, 60, 160, 35);
        ctx.fillStyle = "#102a45"; ctx.font = "12px sans-serif"; ctx.fillText("시료", 125, 82);
        
        ctx.beginPath(); ctx.moveTo(60, 115); ctx.lineTo(220, 115); ctx.stroke();
        ctx.fillText("220mm", 120, 132);
        
        drawArrow(ctx, 140, 15, 140, 55, "가열면");
        ctx.fillStyle = "#102a45"; ctx.font = "11px sans-serif";
        ctx.fillText(`두께: ${currentThick}`, 120, 105);
      });

      createCanvasBox(container, "불연시험용 도면 (규격: Φ45 / 50mm)", "bulyeon", (ctx, currentThick) => {
        ctx.fillStyle = "#eef2f6"; ctx.strokeStyle = "#102a45"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(140, 50, 40, 15, 0, 0, 2 * Math.PI); ctx.fill(); ctx.stroke();
        ctx.fillRect(100, 50, 80, 60); ctx.strokeRect(100, 50, 80, 60);
        ctx.beginPath(); ctx.ellipse(140, 110, 40, 15, 0, 0, 2 * Math.PI); ctx.fill(); ctx.stroke();
        
        ctx.fillStyle = "#102a45"; ctx.font = "12px sans-serif"; ctx.fillText("Φ45", 130, 54);
        ctx.fillText(`두께: ${currentThick}`, 120, 85);
      }, "50mm");

    } else if((mat === '준불연재료' || mat === '난연재료') && rowCount === 1) {
      const defaultThick = rows[0].querySelector('[data-col="thick"]').value.trim() || "42mm";
      createCanvasBox(container, `${mat} 단층형 도면`, "single", (ctx, currentThick) => {
        ctx.fillStyle = "#eef2f6"; ctx.fillRect(70, 60, 150, 45);
        ctx.strokeStyle = "#102a45"; ctx.lineWidth = 2; ctx.strokeRect(70, 60, 150, 45);
        
        const label = rows[0].querySelector('[data-col="gusung"]').value || 'PIR 우레탄폼';
        ctx.fillStyle = "#102a45"; ctx.font = "12px sans-serif"; ctx.fillText(label, 110, 86);
        ctx.fillText(`두께: ${currentThick}`, 115, 125);

        drawArrow(ctx, 145, 15, 145, 55, "가열면");
      }, defaultThick);

    } else {
      let sumThick = 0;
      rows.forEach(r => {
        const val = parseInt(r.querySelector('[data-col="thick"]').value) || 0;
        sumThick += val;
      });
      const defaultThick = sumThick > 0 ? sumThick + "mm" : "45mm";

      createCanvasBox(container, `${mat} 다층 복합형 도면`, "multi", (ctx, currentThick) => {
        const totalHeight = 80;
        const layerH = totalHeight / rowCount;
        const startY = 55;
        
        rows.forEach((r, idx) => {
          const currY = startY + (idx * layerH);
          ctx.fillStyle = idx === heatIndex ? "#d9e2ec" : "#ffffff";
          ctx.fillRect(70, currY, 150, layerH);
          ctx.strokeStyle = "#102a45"; ctx.lineWidth = 1.5; ctx.strokeRect(70, currY, 150, layerH);
          
          let layerName = r.querySelector('[data-col="gusung"]').value || `레이어 ${idx+1}`;
          const modelName = r.querySelector('[data-col="model"]').value.trim();
          if(modelName) layerName += ` (${modelName})`;
          
          ctx.fillStyle = "#102a45"; ctx.font = "10px sans-serif";
          ctx.fillText(layerName, 80, currY + (layerH/2) + 4);
        });

        const arrowTargetY = startY + (heatIndex * layerH);
        drawArrow(ctx, 145, 12, 145, arrowTargetY, "가열면");
        
        ctx.strokeStyle = "#9aa5b1"; ctx.beginPath(); ctx.moveTo(230, startY); ctx.lineTo(230, startY + totalHeight); ctx.stroke();
        ctx.fillStyle = "#102a45"; ctx.font = "10px sans-serif";
        ctx.fillText(`총두께: ${currentThick}`, 235, startY + (totalHeight/2));
      }, defaultThick);
    }
  }

  function createCanvasBox(parent, title, key, drawFn, fallbackThick = "43mm") {
    const box = document.createElement('div'); box.className = 'canvas-box';
    const p = document.createElement('p'); p.textContent = title; box.appendChild(p);
    
    const canvas = document.createElement('canvas'); canvas.width = 290; canvas.height = 150;
    box.appendChild(canvas);
    
    if(!manualThicknesses[key] && fallbackThick) {
      manualThicknesses[key] = fallbackThick;
    }
    const currentThick = manualThicknesses[key] || fallbackThick;

    const div = document.createElement('div'); div.style.marginTop = '6px';
    div.innerHTML = `<label style="font-size:11px;font-weight:700;">두께 기입: </label><input type="text" value="${currentThick}" style="width:70px; font-size:11px; padding:2px; text-align:center;" />`;
    
    div.querySelector('input').addEventListener('input', (e) => {
      manualThicknesses[key] = e.target.value;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawFn(ctx, e.target.value);
    });

    box.appendChild(div);
    parent.appendChild(box);
    
    const ctx = canvas.getContext('2d');
    drawFn(ctx, currentThick);
  }

  function drawArrow(ctx, fromx, fromy, tox, toy, text) {
    ctx.strokeStyle = "#b23a33"; ctx.fillStyle = "#b23a33"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(fromx, fromy); ctx.lineTo(tox, toy); ctx.stroke();
    const headlen = 7;
    const angle = Math.atan2(toy - fromy, tox - fromx);
    ctx.beginPath();
    ctx.moveTo(tox, toy);
    ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
    ctx.fill();
    if(text) { ctx.font = "bold 11px sans-serif"; ctx.fillText(text, fromx - 15, fromy - 4); }
  }

  const subBulyeon=document.getElementById('sub_bulyeon'), subYeolbang=document.getElementById('sub_yeolbang'), subGas=document.getElementById('sub_gas');
  document.querySelectorAll('input[name="MAT"]').forEach(r=>{
    r.addEventListener('change', ()=>{
      if(r.value==='불연재료'){ subBulyeon.checked=true; subYeolbang.checked=false; subGas.checked=true; }
      else { subBulyeon.checked=false; subYeolbang.checked=true; subGas.checked=true; }
      onTestChange();
    });
  });
  [subBulyeon,subYeolbang,subGas].forEach(cb=>cb.addEventListener('change', onTestChange));

  function matVal(){ const el=document.querySelector('input[name="MAT"]:checked'); return el?el.value:''; }
  function testLabel(t){
    if(t==='열방출률시험'){
      const m = matVal();
      if(m==='준불연재료') return '열방출률시험(준불연)';
      if(m==='난연재료') return '열방출률시험(난연)';
    }
    return t;
  }
  function getCheckedTests(){
    const list=[];
    if(subBulyeon.checked) list.push('불연시험');
    if(subYeolbang.checked) list.push('열방출률시험');
    if(subGas.checked) list.push('가스유해성시험');
    return list;
  }
  function getCheckedTestLabels(){ return getCheckedTests().map(testLabel); }

  function computeSampleQty(){
    const list = getCheckedTests();
    const parts=[];
    if(list.includes('불연시험')) parts.push('Φ45(±2)×50(±3)mm 4개');
    if(list.includes('열방출률시험')) parts.push('100(±2)×100(±2)mm 4개');
    if(list.includes('가스유해성시험')) parts.push('220×220mm 3개');
    return parts.join(', ');
  }
  function updateQtySelect(){
    const computed = computeSampleQty();
    const sel = document.getElementById('A_sampleQtySelect');
    const wasManual = sel.value === '__manual__';
    sel.innerHTML = `<option value="${computed}">${computed || '시험을 먼저 선택하세요'}</option><option value="__manual__">직접 입력</option>`;
    sel.value = wasManual ? '__manual__' : computed;
    document.getElementById('A_sampleQtyManualWrap').classList.toggle('show', sel.value==='__manual__');
  }
  function onQtySelectChange(){
    document.getElementById('A_sampleQtyManualWrap').classList.toggle('show', document.getElementById('A_sampleQtySelect').value==='__manual__');
  }
  function getSampleQtyValue(){
    const sel = document.getElementById('A_sampleQtySelect');
    return sel.value==='__manual__' ? document.getElementById('A_sampleQtyManual').value : sel.value;
  }

  const CRITERIA = {

  // ---- 전자서명 캔버스 핸들러 ----
  const canvas=document.getElementById('sigPad'), ctx=canvas.getContext('2d');
  let drawing=false, hasSig=false;
  function resizeCanvas(){
    const ratio=window.devicePixelRatio||1, w=canvas.clientWidth, h=canvas.clientHeight;
    canvas.width=w*ratio; canvas.height=h*ratio; ctx.scale(ratio,ratio);
    ctx.strokeStyle='#1F4E79'; ctx.lineWidth=2.4; ctx.lineCap='round';
  }
  window.addEventListener('resize', resizeCanvas);
  function getPos(e){ const r=canvas.getBoundingClientRect(); const cx=e.touches?e.touches[0].clientX:e.clientX; const cy=e.touches?e.touches[0].clientY:e.clientY; return {x:cx-r.left,y:cy-r.top}; }
  function start(e){drawing=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault();}
  function move(e){ if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasSig=true; const st=document.getElementById('sigStatus'); st.textContent='서명 완료'; st.classList.add('ok'); e.preventDefault(); updateTabStatus(); }
  function end(){drawing=false;}
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',end);
  function clearSig(){ resizeCanvas(); hasSig=false; const st=document.getElementById('sigStatus'); st.textContent='서명이 필요합니다'; st.classList.remove('ok'); updateTabStatus(); }
  setTimeout(resizeCanvas,100);
  function sigDataUrl(){ return canvas.toDataURL('image/png'); }

  function validate(){
    let ok=true;
    ['c_company','c_requester','c_phone','c_email','c_sample'].forEach(id=>{
      const el=document.getElementById(id);
      if(!el.value.trim()){ ok=false; el.style.borderColor='var(--seal)'; } else el.style.borderColor='var(--border)';
    });
    if(!document.getElementById('a_address').value.trim()) ok = false;
    if(!document.querySelector('[data-label="사업자등록번호"]').value.trim()) ok = false;
    if(!document.querySelector('[data-label="대표자 성명"]').value.trim()) ok = false;
    if(!document.querySelector('input[name="heat_side"]:checked')) ok = false;
    if(!matVal()) ok=false;
    if(!hasSig) ok=false;
    return ok;
  }

  function downloadPdf(elId, nameLabel){
    const node = document.getElementById(elId);
    html2canvas(node, {scale:2, useCORS:true, backgroundColor:'#ffffff'}).then(canvas=>{
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p','mm','a4');
      const pageWidth=210, pageHeight=297;
      const imgWidth=pageWidth, imgHeight=canvas.height*imgWidth/canvas.width;
      let heightLeft=imgHeight, position=0;
      pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
      heightLeft -= pageHeight;
      while(heightLeft>0){ position = heightLeft - imgHeight; pdf.addPage(); pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight); heightLeft -= pageHeight; }
      const company = document.getElementById('c_company').value.trim() || '작성서류';
      pdf.save(`KCMIC_${company}_${nameLabel}.pdf`);
    }).catch(err=>alert('PDF 생성 중 오류: '+err.message));
  }
